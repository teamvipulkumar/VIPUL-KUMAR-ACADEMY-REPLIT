kind = "web"
previewPath = "/"
title = "Course Platform"
version = "1.0.0"
id = "artifacts/course-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26209

[services.development]
run = "pnpm --filter @workspace/course-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/course-platform", "run", "build" ]
publicDir = "artifacts/course-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26209"
BASE_PATH = "/"
